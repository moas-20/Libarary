<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>MYLibarary</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <!-- Tho Top Navbar -->
        <div class="nav">
            <div class="top-nav">
               <div><h1>MyLibarary</h1></div> 
               <div><button class="form-disp">Add Book</button></div>
            </div>
            <div class="button-nav">
                <hr>
            </div>
        </div>

        <!-- Main Body -->
        <div class="main">
            <div class="form-container">
                <form class="form">
                    <h3>Add new Book</h3>
                    <hr>
                    <label for="title">Title: </label>
                    <input type="text" name="title" id="title" required>
                    <label for="auther">Auther: </label>
                    <input type="text" name="auther" id="auther" required>
                    <label for="pages">Pages: </label>
                    <input type="number" name="pages" id="pages" required>
                    <div class="check">
                        <label for="status">Did you read the book?</label>
                        <input type="checkbox" name="status" id="status" required>
                    </div>           
                    <div class="form-btn">
                        <button class="form-cns" type="button">Cancle</button>
                        <button class="form-add" type="button">Add</button>
                    </div>
                </form>
            </div>
            <!-- Book Cards -->
            <div class="books-container">
                <div class="card">
                    <div class="card-data">
                    <h3>Titel</h3>
                    <p>Book Name</p>
                    <hr>
                    <h3>Auther</h3>
                    <p>auther name</p>
                    <hr>
                    <h3>pages</h3>
                    <p>number of page</p>
                    <hr>
                    <span>readed</span>
                    </div>
                    <div class="card-btn">
                        <button>read</button>
                        <button>delet</button>
                    </div>   
                </div>
                <div class="card">
                    <h3>Titel</h3>
                    <p>Book Name</p>
                    <hr>
                    <h3>Auther</h3>
                    <p>auther name</p>
                    <hr>
                    <h3>pages</h3>
                    <p>number of page</p>
                    <hr>
                    <h3>readed</h3>
                </div>
            </div>
        </div>




        <script src="script.js"></script>
    </body>
</html>
